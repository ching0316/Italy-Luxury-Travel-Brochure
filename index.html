                                )}

                                {activeTab === "phrases" && (
                                    <div class="space-y-4">
                                        <div class="flex justify-between items-center">
                                            <h2 class="text-xs font-black uppercase tracking-wider text-amber-500 flex items-center gap-1">
                                                <Lucide name="languages" className="w-4 h-4 text-amber-500" />
                                                <span>日常實用義大利語速查</span>
                                            </h2>
                                            <button 
                                                onClick={() => { setFlashcardIndex(0); setShowAnswer(false); }}
                                                class="bg-emerald-800 hover:bg-emerald-700 text-white font-bold text-[12px] px-2 py-0.5 rounded flex items-center gap-0.5"
                                            >
                                                ⚡ 閃卡記憶模式
                                            </button>
                                        </div>

                                        {/* 語彙閃卡模式 overlay 視窗 */}
                                        {flashcardIndex !== null && (
                                            <div class="p-4 rounded-xl border border-amber-500/20 bg-gradient-to-br from-emerald-950 to-teal-950 text-white text-center space-y-4 relative">
                                                <button onClick={() => setFlashcardIndex(null)} class="absolute top-2 right-2 text-zinc-300 hover:text-white">✕</button>
                                                <div class="text-[12px] text-amber-400 font-bold uppercase">義語記憶閃卡 ({flashcardIndex + 1}/{PHRASEBOOK_DATA.length})</div>
                                                <div class="space-y-1">
                                                    <div class="text-2xl font-black text-amber-300 tracking-wide">{PHRASEBOOK_DATA[flashcardIndex].italian}</div>
                                                    <div class="text-xs text-zinc-300">發音：{PHRASEBOOK_DATA[flashcardIndex].pinyin}</div>
                                                </div>
                                                <button 
                                                    onClick={() => speakItalian(PHRASEBOOK_DATA[flashcardIndex].italian)}
                                                    class="mx-auto flex items-center gap-1 px-3 py-1 rounded bg-amber-400 text-emerald-950 text-[12px] font-black"
                                                >
                                                    <Lucide name="volume-2" className="w-3.5 h-3.5 text-emerald-950" /> 播音
                                                </button>
                                                <div class="pt-2.5 border-t border-white/10">
                                                    {showAnswer ? (
                                                        <div class="space-y-1">
                                                            <div class="text-sm font-bold text-emerald-100">{PHRASEBOOK_DATA[flashcardIndex].chinese}</div>
                                                            <div class="text-[12px] text-zinc-450">{PHRASEBOOK_DATA[flashcardIndex].usage}</div>
                                                        </div>
                                                    ) : (
                                                        <button onClick={() => setShowAnswer(true)} class="bg-white/10 hover:bg-white/20 text-white text-[12px] px-3 py-1 rounded font-bold">顯示翻譯</button>
                                                    )}
                                                </div>
                                                <div class="flex gap-2 pt-2">
                                                    <button 
                                                        disabled={flashcardIndex === 0} 
                                                        onClick={() => { setFlashcardIndex(prev => prev - 1); setShowAnswer(false); }}
                                                        class="flex-1 bg-zinc-800 disabled:opacity-40 py-1.5 rounded text-[12px] font-bold"
                                                    >
                                                        上一個
                                                    </button>
                                                    <button 
                                                        onClick={() => {
                                                            if (flashcardIndex === PHRASEBOOK_DATA.length - 1) {
                                                                setFlashcardIndex(null);
                                                            } else {
                                                                setFlashcardIndex(prev => prev + 1);
                                                                setShowAnswer(false);
                                                            }
                                                        }}
                                                        class="flex-1 bg-amber-400 text-emerald-950 py-1.5 rounded text-[12px] font-black"
                                                    >
                                                        {flashcardIndex === PHRASEBOOK_DATA.length - 1 ? "完成" : "下一個"}
                                                    </button>
                                                </div>
                                            </div>
                                        )}

                                        <div class="space-y-2">
                                            <input 
                                                type="text" 
                                                value={phraseSearch} 
                                                onChange={(e) => setPhraseSearch(e.target.value)}
                                                placeholder="搜尋義語、中文或場景..." 
                                                class={`w-full px-3 py-2 text-xs rounded-lg border outline-none ${darkMode ? "bg-slate-800 border-slate-700 text-white" : "bg-white border-zinc-200 text-zinc-900"}`}
                                            />
                                            <div class="space-y-2.5 max-h-[460px] overflow-y-auto no-scrollbar">
                                                {PHRASEBOOK_DATA.filter(p => 
                                                    p.italian.toLowerCase().includes(phraseSearch.toLowerCase()) || 
                                                    p.chinese.includes(phraseSearch) || 
                                                    p.usage.includes(phraseSearch)
                                                ).map((phrase) => (
                                                    <div key={phrase.italian} class={`p-3 rounded-xl border flex justify-between items-center ${darkMode ? "bg-slate-900 border-slate-800 text-white" : "bg-white border-zinc-200 text-zinc-900"}`}>
                                                        <div>
                                                            <div class="flex items-center gap-1.5">
                                                                <span class="text-sm font-black text-emerald-900 dark:text-amber-400">{phrase.italian}</span>
                                                                <span class="text-[12px] text-zinc-400 font-bold">[{phrase.pinyin}]</span>
                                                            </div>
                                                            <p class="text-xs font-extrabold text-stone-850 dark:text-slate-100">{phrase.chinese}</p>
                                                            <p class="text-[12px] text-zinc-500 italic mt-0.5">{phrase.usage}</p>
                                                        </div>
                                                        <button 
                                                            onClick={() => speakItalian(phrase.italian)}
                                                            class="p-2 bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-800 dark:text-amber-400 rounded-full transition-all flex items-center justify-center"
                                                        >
                                                            <Lucide name="volume-2" className="w-4 h-4 text-emerald-800 dark:text-amber-400" />
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}

                            </div>

                            {/* 底部導覽列 - 動態避開 iPhone 14 Pro 底部 Home 橫條 */}
                            <nav class="absolute bottom-0 left-0 right-0 border-t flex justify-around pb-4 pt-2.5 safe-bottom z-50 bg-white/95 dark:bg-slate-950/95 border-zinc-150 dark:border-slate-850 text-zinc-800 dark:text-slate-100 backdrop-blur-md">
                                <button 
                                    onClick={() => setActiveTab("itinerary")}
                                    class={`flex flex-col items-center gap-1 transition-all ${activeTab === "itinerary" ? "text-emerald-700 dark:text-amber-400 scale-105 font-bold" : "text-zinc-450"}`}
                                >
                                    <Lucide name="calendar" className="w-5 h-5" />
                                    <span class="text-[11px] font-black">每日行程</span>
                                </button>
                                <button 
                                    onClick={() => setActiveTab("flights")}
                                    class={`flex flex-col items-center gap-1 transition-all ${activeTab === "flights" ? "text-emerald-700 dark:text-amber-400 scale-105 font-bold" : "text-zinc-450"}`}
                                >
                                    <Lucide name="plane" className="w-5 h-5" />
                                    <span class="text-[11px] font-black">航班高鐵</span>
                                </button>
                                <button 
                                    onClick={() => setActiveTab("checklist")}
                                    class={`flex flex-col items-center gap-1 transition-all ${activeTab === "checklist" ? "text-emerald-700 dark:text-amber-400 scale-105 font-bold" : "text-zinc-450"}`}
                                >
                                    <div class="relative flex items-center justify-center">
                                        <Lucide name="check-square" className="w-5 h-5" />
                                        {checklistPercent > 0 && (
                                            <span class="absolute -top-1.5 -right-2 bg-amber-400 text-emerald-950 text-[9px] font-black rounded-full px-1">{checklistPercent}%</span>
                                        )}
                                    </div>
                                    <span class="text-[11px] font-black">行李打包</span>
                                </button>
                                <button 
                                    onClick={() => setActiveTab("phrases")}
                                    class={`flex flex-col items-center gap-1 transition-all ${activeTab === "phrases" ? "text-emerald-700 dark:text-amber-400 scale-105 font-bold" : "text-zinc-450"}`}
                                >
                                    <Lucide name="languages" className="w-5 h-5" />
                                    <span class="text-[11px] font-black">隨身義語</span>
                                </button>
                            </nav>

                        </div>
                    </div>
                </div>
            );
        }

        // 初始化掛載 React 元件
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
